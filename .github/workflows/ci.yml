name: CI

# Install + typecheck + build gate for the Vite/React app. Required by
# auto-merge.yml.

on:
  pull_request:
  push:
    branches:
      - 'claude/**'
      - 'feat/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test (if configured)
        run: npm test --if-present

      - name: Build (vite)
        run: npm run build
